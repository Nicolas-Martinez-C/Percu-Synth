<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PercuSynth — Sample Loader</title>
<style>
/* === BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d0d14;
  --bg2:     #161621;
  --bg3:     #1e1e2c;
  --border:  #2e2e44;
  --accent:  #00e5a0;
  --accent2: #7c5cff;
  --text:    #d0d0e8;
  --dim:     #5a5a80;
  --warn:    #ffcc44;
  --err:     #ff5555;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 16px;
  font-size: 13px;
}
/* === HEADER === */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 14px;
  background: var(--bg2);
}
.logo { display: flex; align-items: baseline; gap: 6px; }
.logo-mark { color: var(--accent); font-size: 22px; }
.logo-title { font-size: 17px; font-weight: bold; letter-spacing: 5px; color: var(--accent); }
.logo-sub   { font-size: 10px; color: var(--dim); letter-spacing: 3px; margin-left: 4px; }
.header-right { display: flex; align-items: center; gap: 12px; }
#total-size { font-size: 11px; color: var(--dim); }

/* === SECTION === */
section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.section-title {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--dim);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
/* === PADS === */
.pads-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.pad {
  flex: 1;
  min-width: 150px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: border-color 0.2s;
}
.pad.held     { border-color: var(--accent); }
.pad.selected { border-color: var(--pc, var(--accent)); box-shadow: 0 0 12px var(--pc, var(--accent)); }
.waveform {
  width: 100%;
  height: 56px;
  border-radius: 4px;
  display: block;
  cursor: pointer;
}
.pad-trigger {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid var(--pc, #888);
  background: radial-gradient(circle at 38% 35%, rgba(255,255,255,0.08), #111116);
  color: var(--pc, #888);
  font-family: 'Courier New', monospace;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.07s;
  user-select: none;
  -webkit-user-select: none;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
  position: relative;
}
.pad-trigger::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
}
.pad-trigger:hover { box-shadow: 0 0 18px var(--pc, #888), inset 0 0 8px rgba(255,255,255,0.04); }
.pad-trigger.pressed {
  background: radial-gradient(circle at 38% 35%, var(--pc, #888), #222);
  box-shadow: 0 0 30px var(--pc, #888);
  color: #000;
  transform: scale(0.94);
}
.pad-info { text-align: center; width: 100%; }
.pad-name {
  font-size: 11px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 160px;
}
.pad-note { font-size: 15px; color: var(--accent); font-weight: bold; margin-top: 3px; min-height: 18px; }
.load-label {
  font-size: 10px; letter-spacing: 1px; color: var(--dim);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 12px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.load-label:hover { border-color: var(--accent); color: var(--accent); }
.clear-btn {
  font-size: 9px; color: var(--dim); background: none; border: none;
  cursor: pointer; padding: 2px 4px; font-family: inherit;
}
.clear-btn:hover { color: var(--err); }
/* === GENERATE === */
.generate-section {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
#size-breakdown { font-size: 11px; color: var(--dim); text-align: center; }
.generate-btn {
  padding: 14px 52px;
  font-family: 'Courier New', monospace;
  font-size: 13px; letter-spacing: 3px;
  background: linear-gradient(135deg, #002a1a, #000d08);
  color: var(--accent);
  border: 2px solid var(--accent);
  border-radius: 6px; cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 0 16px rgba(0,229,160,0.15);
}
.generate-btn:hover {
  background: linear-gradient(135deg, #005533, #001f0f);
  box-shadow: 0 0 28px rgba(0,229,160,0.35);
  transform: translateY(-1px);
}
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
.log {
  width: 100%; max-height: 140px; overflow-y: auto;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 8px; font-size: 11px; line-height: 1.6;
}
.log-info { color: var(--dim); }
.log-ok   { color: var(--accent); }
.log-warn { color: var(--warn); }
.log-err  { color: var(--err); }
/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-mark">◈</span>
    <span class="logo-title">PERCUSYNTH</span>
    <span class="logo-sub">SAMPLE LOADER</span>
  </div>
  <div class="header-right">
    <span id="total-size">0.00 MB total</span>
  </div>
</header>

<main>
  <section>
    <div class="section-title">SAMPLE BANKS — click pad to trigger · PITCH se configura en el hardware: mantén botón + gira POT PITCH</div>
    <div class="pads-grid" id="pads-grid"></div>
  </section>

  <section class="generate-section">
    <div id="size-breakdown">No samples loaded</div>
    <button class="generate-btn" id="generate-btn">⬇ GENERATE FIRMWARE (.ino)</button>
    <div class="log" id="log"></div>
  </section>
</main>

<script>
'use strict';

// ============================================================
// CONFIG
// ============================================================
const SAMPLE_RATE    = 44100;
const MAX_SECS       = 2;          // max sample duration
const NUM_PADS       = 5;
const PAD_COLORS     = ['#ff6b6b','#ffd93d','#6bff6b','#6bb8ff','#d06bff'];
const PAD_KEYS       = ['1','2','3','4','5'];
const BTN_PINS       = [44, 42, 0, 45, 47];
const POT_PINS       = [1, 2, 8, 10];   // pitch, filter, reso, pwm
const PHRYGIAN_IVS   = [0, 1, 3, 5, 7, 8, 10];
const NOTE_NAMES     = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

// ============================================================
// PHRYGIAN SCALE
// ============================================================
// Phrygian table for firmware generation (root = A, fixed)
const PHRYGIAN_ROOT = 'A';

// ============================================================
// STATE
// ============================================================
const state = {
  pads: Array.from({length: NUM_PADS}, (_, i) => ({
    index: i, name: null, audioBuffer: null, int16Data: null
  })),
  audioCtx: null,
  currentSource: null,   // active BufferSourceNode (monophonic)
  currentGain:   null,   // per-source GainNode for click-free fade
  currentPadIdx: null
};

// ============================================================
// AUDIO CONTEXT
// ============================================================
function getCtx() {
  if (!state.audioCtx) {
    state.audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
  }
  if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
  return state.audioCtx;
}

// ============================================================
// SAMPLE LOADING
// ============================================================
async function loadFile(padIdx, file) {
  log(`Loading ${file.name} ...`);
  try {
    const ctx = getCtx();
    const ab  = await file.arrayBuffer();
    const raw = await ctx.decodeAudioData(ab);
    const { audioBuffer, int16Data } = await processBuffer(raw);

    const pad = state.pads[padIdx];
    pad.name        = file.name.replace(/\.[^.]+$/, '');
    pad.audioBuffer = audioBuffer;  // truncated to MAX_SECS, mono, 44100Hz
    pad.int16Data   = int16Data;

    renderPad(padIdx);
    updateSizeInfo();
    log(`OK: ${file.name} → ${(int16Data.length * 2 / 1024).toFixed(1)} KB @ ${SAMPLE_RATE} Hz mono`, 'ok');
  } catch (e) {
    log(`Error: ${e.message}`, 'err');
  }
}

async function processBuffer(buf) {
  // Resample to SAMPLE_RATE, mix to mono, truncate to MAX_SECS
  const maxSamples = Math.ceil(Math.min(buf.duration, MAX_SECS) * SAMPLE_RATE);
  const off = new OfflineAudioContext(1, maxSamples, SAMPLE_RATE);
  const src = off.createBufferSource();
  src.buffer = buf;
  src.connect(off.destination);
  src.start(0);
  const rendered = await off.startRendering(); // AudioBuffer: mono, 44100Hz, ≤MAX_SECS

  const raw = rendered.getChannelData(0);

  // Normalize peak to ±1
  let peak = 0;
  for (const v of raw) if (Math.abs(v) > peak) peak = Math.abs(v);
  const normScale = peak > 0 ? 1 / peak : 0;

  // Normalized AudioBuffer for web playback (same duration as firmware)
  const audioBuffer = new AudioBuffer({ numberOfChannels: 1, length: raw.length, sampleRate: SAMPLE_RATE });
  const ch = audioBuffer.getChannelData(0);
  for (let i = 0; i < raw.length; i++) ch[i] = raw[i] * normScale;

  // Int16 array for firmware code generation
  const int16Data = new Int16Array(raw.length);
  for (let i = 0; i < raw.length; i++) {
    int16Data[i] = Math.round(Math.max(-32768, Math.min(32767, ch[i] * 32767)));
  }

  return { audioBuffer, int16Data };
}

// ============================================================
// PLAYBACK  (monophonic, click-free via per-source GainNode fade)
// ============================================================
const FADE_S = 0.008; // 8 ms — inaudible gap, eliminates discontinuity click

function playSample(padIdx) {
  const pad = state.pads[padIdx];
  if (!pad.audioBuffer) return;

  const ctx = getCtx();
  const t   = ctx.currentTime;

  // Stop current source: force gain to 1 then ramp to 0 over FADE_S
  if (state.currentSource) {
    const oldSrc  = state.currentSource;
    const oldGain = state.currentGain;
    state.currentSource = null;
    state.currentGain   = null;
    oldGain.gain.cancelScheduledValues(t);
    oldGain.gain.setValueAtTime(1, t);
    oldGain.gain.linearRampToValueAtTime(0, t + FADE_S);
    oldSrc.stop(t + FADE_S + 0.002);
    setTimeout(() => { try { oldSrc.disconnect(); oldGain.disconnect(); } catch(e) {} },
               (FADE_S + 0.05) * 1000);
  }

  // New source: fade in over FADE_S to avoid onset click
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(1, t + FADE_S);
  gain.connect(ctx.destination);

  const src = ctx.createBufferSource();
  src.buffer = pad.audioBuffer;
  src.connect(gain);
  src.start(t);

  state.currentSource = src;
  state.currentGain   = gain;
  state.currentPadIdx = padIdx;

  src.onended = () => {
    if (state.currentSource === src) {
      state.currentSource = null;
      state.currentGain   = null;
      state.currentPadIdx = null;
    }
    try { gain.disconnect(); } catch(e) {}
  };

  flashPad(padIdx);
}

function flashPad(padIdx) {
  const btn = document.getElementById(`trig-${padIdx}`);
  if (!btn) return;
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 120);
}

// ============================================================
// PAD UI
// ============================================================
function createPads() {
  const grid = document.getElementById('pads-grid');
  for (let i = 0; i < NUM_PADS; i++) {
    const col = PAD_COLORS[i];
    const el = document.createElement('div');
    el.className = 'pad';
    el.id = `pad-${i}`;
    el.style.setProperty('--pc', col);
    el.innerHTML = `
      <canvas class="waveform" id="wave-${i}" width="180" height="56"></canvas>
      <button class="pad-trigger" id="trig-${i}"
              style="--pc:${col}; border-color:${col}; color:${col}">
        ${PAD_KEYS[i]}
      </button>
      <div class="pad-info">
        <div class="pad-name" id="pname-${i}">— empty —</div>
      </div>
      <label class="load-label" for="file-${i}">Load Sample</label>
      <input type="file" id="file-${i}" accept="audio/*" hidden>
      <button class="clear-btn" id="clear-${i}" style="display:none">✕ clear</button>
    `;
    grid.appendChild(el);

    // File input
    document.getElementById(`file-${i}`).addEventListener('change', async e => {
      if (e.target.files[0]) await loadFile(i, e.target.files[0]);
      e.target.value = '';
    });

    // Clear
    document.getElementById(`clear-${i}`).addEventListener('click', () => {
      const pad = state.pads[i];
      pad.name = null; pad.audioBuffer = null; pad.int16Data = null;
      renderPad(i);
      updateSizeInfo();
    });

    // Drag & drop
    el.addEventListener('dragover', e => { e.preventDefault(); el.style.borderColor = col; });
    el.addEventListener('dragleave', () => { el.style.borderColor = ''; });
    el.addEventListener('drop', async e => {
      e.preventDefault(); el.style.borderColor = '';
      const file = e.dataTransfer.files[0];
      if (file) await loadFile(i, file);
    });

    // Trigger button — click = play
    const trig = document.getElementById(`trig-${i}`);
    trig.addEventListener('mousedown', e => {
      e.preventDefault();
      playSample(i);
    });
    trig.addEventListener('touchstart', e => {
      e.preventDefault();
      playSample(i);
    }, {passive: false});
  }
}

function renderPad(padIdx) {
  const pad = state.pads[padIdx];
  document.getElementById(`pname-${padIdx}`).textContent = pad.name ?? '— empty —';
  const clearBtn = document.getElementById(`clear-${padIdx}`);
  if (clearBtn) clearBtn.style.display = pad.int16Data ? '' : 'none';
  drawWaveform(padIdx);
}

function drawWaveform(padIdx) {
  const canvas = document.getElementById(`wave-${padIdx}`);
  const ctx2   = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = state.pads[padIdx];
  const col = PAD_COLORS[padIdx];

  ctx2.clearRect(0, 0, W, H);
  ctx2.fillStyle = '#12121c';
  ctx2.fillRect(0, 0, W, H);

  if (!pad.int16Data) {
    ctx2.fillStyle = '#2a2a3c';
    ctx2.font = '10px Courier New';
    ctx2.textAlign = 'center';
    ctx2.fillText('drag & drop or click Load', W / 2, H / 2 + 4);
    return;
  }

  const data = pad.int16Data;
  const step = data.length / W;

  // Draw filled waveform (min/max per pixel column)
  ctx2.fillStyle = col + '44';
  for (let x = 0; x < W; x++) {
    let mn = 0, mx = 0;
    const i0 = Math.floor(x * step);
    const i1 = Math.min(Math.floor((x + 1) * step), data.length);
    for (let j = i0; j < i1; j++) {
      const v = data[j] / 32768;
      if (v < mn) mn = v;
      if (v > mx) mx = v;
    }
    const yTop = (H / 2) - mx * (H / 2 - 2);
    const yBot = (H / 2) - mn * (H / 2 - 2);
    ctx2.fillRect(x, yTop, 1, Math.max(1, yBot - yTop));
  }

  // Draw line
  ctx2.strokeStyle = col + 'cc';
  ctx2.lineWidth = 1;
  ctx2.beginPath();
  for (let x = 0; x < W; x++) {
    const i = Math.floor(x * step);
    const y = (H / 2) - (data[i] / 32768) * (H / 2 - 2);
    x === 0 ? ctx2.moveTo(x, y) : ctx2.lineTo(x, y);
  }
  ctx2.stroke();

  // Duration label
  const dur = (data.length / SAMPLE_RATE).toFixed(2);
  ctx2.fillStyle = col + 'aa';
  ctx2.font = '9px Courier New';
  ctx2.textAlign = 'right';
  ctx2.fillText(`${dur}s · ${(data.length * 2 / 1024).toFixed(0)}KB`, W - 4, H - 4);
}

// ============================================================
// SIZE INFO
// ============================================================
function updateSizeInfo() {
  let total = 0;
  const parts = [];
  for (const pad of state.pads) {
    if (pad.int16Data) {
      const kb = pad.int16Data.length * 2;
      total += kb;
      parts.push(`${pad.name}: ${(kb/1024).toFixed(1)}KB`);
    }
  }
  document.getElementById('total-size').textContent =
    `${(total/1024/1024).toFixed(2)} MB total`;
  document.getElementById('size-breakdown').textContent =
    parts.length ? parts.join('  ·  ') : 'No samples loaded';
  if (total > 3 * 1024 * 1024) {
    log('Warning: samples > 3 MB. The .ino file will be large — compilation may be slow.', 'warn');
  }
}

// ============================================================
// LOG
// ============================================================
function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const d  = document.createElement('div');
  d.className = `log-${type}`;
  d.textContent = `> ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ============================================================
// CODE GENERATION
// ============================================================
function int16ToCLiteral(arr, name) {
  const PER_LINE = 16;
  const out = [];
  out.push(`// ${name}: ${arr.length} samples (${(arr.length*2/1024).toFixed(1)} KB, ${(arr.length/SAMPLE_RATE).toFixed(3)} s)`);
  out.push(`const int16_t ${name}[] PROGMEM = {`);
  for (let i = 0; i < arr.length; i += PER_LINE) {
    const chunk = Array.from(arr.slice(i, i + PER_LINE)).join(', ');
    out.push('  ' + chunk + (i + PER_LINE < arr.length ? ',' : ''));
  }
  out.push('};');
  out.push(`const uint32_t ${name}_LEN = ${arr.length}UL;`);
  return out.join('\n');
}

function generateFirmware() {
  const L = [];
  const rootName = PHRYGIAN_ROOT;

  // --- Header ---
  L.push(`// =======================================================`);
  L.push(`// PercuSynth — Sample Firmware`);
  L.push(`// Generated by PercuSynth Sample Loader`);
  L.push(`// ${new Date().toLocaleString()}`);
  L.push(`//`);
  L.push(`// Board  : ESP32-S3`);
  L.push(`// Arduino: ESP32 core ≥ 3.x`);
  L.push(`// Scale  : ${rootName} Phrygian`);
  L.push(`// =======================================================`);
  L.push(`#include <Arduino.h>`);
  L.push(`#include "driver/i2s_std.h"`);
  L.push(`#include <math.h>`);
  L.push(``);

  // --- Sample data ---
  L.push(`// =======================================================`);
  L.push(`// SAMPLE DATA`);
  L.push(`// =======================================================`);
  L.push(``);
  for (let i = 0; i < NUM_PADS; i++) {
    const pad = state.pads[i];
    if (pad.int16Data) {
      L.push(int16ToCLiteral(pad.int16Data, `SAMPLE_${i}`));
      L.push(`// Initial pitch: 1.0 (set on hardware: hold button + turn PITCH pot)`);
    } else {
      L.push(`// SAMPLE_${i}: not loaded`);
      L.push(`const int16_t SAMPLE_${i}[] PROGMEM = {0};`);
      L.push(`const uint32_t SAMPLE_${i}_LEN = 0UL;`);
    }
    L.push(``);
  }

  // --- Constants ---
  L.push(`// =======================================================`);
  L.push(`// CONSTANTS & PINOUT`);
  L.push(`// =======================================================`);
  L.push(`#define SAMPLE_RATE  44100`);
  L.push(`#define BUF_SAMPLES  128`);
  L.push(`#define NUM_VOICES   5`);
  L.push(``);
  L.push(`#define PIN_I2S_LRCK 39`);
  L.push(`#define PIN_I2S_DIN  40`);
  L.push(`#define PIN_I2S_BCK  41`);
  L.push(``);
  L.push(`const uint8_t  BTN_PINS[NUM_VOICES] = {${BTN_PINS.join(', ')}};`);
  L.push(`const uint8_t  POT_PINS[4]          = {${POT_PINS.join(', ')}};  // pitch, filter, reso, pwm`);
  L.push(``);

  // Phrygian table
  const phScale = [];
  for (let oct = -2; oct <= 2; oct++) {
    for (const iv of PHRYGIAN_IVS) phScale.push(oct * 12 + iv);
  }
  phScale.sort((a, b) => a - b);
  L.push(`// ${rootName} Phrygian — ±2 octaves (${phScale.length} notes)`);
  L.push(`const int8_t  PHRYGIAN_NOTES[] = {${phScale.join(', ')}};`);
  L.push(`const uint8_t PHRYGIAN_LEN = ${phScale.length};`);
  L.push(``);

  // Sample registry
  L.push(`const int16_t* const SAMPLES[NUM_VOICES]    = {${Array.from({length:NUM_PADS},(_,i)=>`SAMPLE_${i}`).join(', ')}};`);
  L.push(`const uint32_t       SAMPLE_LENS[NUM_VOICES]= {${Array.from({length:NUM_PADS},(_,i)=>`SAMPLE_${i}_LEN`).join(', ')}};`);
  L.push(`float samplePitch[NUM_VOICES] = {1.0f, 1.0f, 1.0f, 1.0f, 1.0f};`);
  L.push(`// ^ hold a button + turn PITCH pot to change at runtime (${rootName} Phrygian, persists until power-off)`);
  L.push(``);

  // --- Voice struct ---
  L.push(`// =======================================================`);
  L.push(`// VOICE`);
  L.push(`// =======================================================`);
  L.push(`struct Voice {`);
  L.push(`  const int16_t* data;`);
  L.push(`  uint32_t       length;`);
  L.push(`  float          position;`);
  L.push(`  float          pitchRatio;`);
  L.push(`  bool           active;`);
  L.push(`};`);
  L.push(`Voice voices[NUM_VOICES];`);
  L.push(``);

  // --- Filter ---
  L.push(`// =======================================================`);
  L.push(`// BIQUAD LOWPASS FILTER`);
  L.push(`// =======================================================`);
  L.push(`float bq_x1, bq_x2, bq_y1, bq_y2;`);
  L.push(`float bq_b0 = 1, bq_b1, bq_b2, bq_a1, bq_a2;`);
  L.push(``);
  L.push(`void computeLPF(float cutoff, float reso) {`);
  L.push(`  float omega  = 2.0f * (float)M_PI * cutoff / SAMPLE_RATE;`);
  L.push(`  float cosW   = cosf(omega);`);
  L.push(`  float sinW   = sinf(omega);`);
  L.push(`  float Q      = 0.5f + reso * 9.5f;`);
  L.push(`  float alpha  = sinW / (2.0f * Q);`);
  L.push(`  float a0inv  = 1.0f / (1.0f + alpha);`);
  L.push(`  bq_b0 = (1.0f - cosW) * 0.5f * a0inv;`);
  L.push(`  bq_b1 = (1.0f - cosW) * a0inv;`);
  L.push(`  bq_b2 = bq_b0;`);
  L.push(`  bq_a1 = -2.0f * cosW * a0inv;`);
  L.push(`  bq_a2 = (1.0f - alpha) * a0inv;`);
  L.push(`}`);
  L.push(``);
  L.push(`inline float applyLPF(float x) {`);
  L.push(`  float y = bq_b0*x + bq_b1*bq_x1 + bq_b2*bq_x2 - bq_a1*bq_y1 - bq_a2*bq_y2;`);
  L.push(`  bq_x2 = bq_x1; bq_x1 = x;`);
  L.push(`  bq_y2 = bq_y1; bq_y1 = y;`);
  L.push(`  return y;`);
  L.push(`}`);
  L.push(``);

  // --- Tremolo/PWM ---
  L.push(`// =======================================================`);
  L.push(`// TREMOLO (PWM pot)`);
  L.push(`// =======================================================`);
  L.push(`float pwmPhase = 0.0f;`);
  L.push(``);
  L.push(`inline float applyTremolo(float s, float rateHz, float depth) {`);
  L.push(`  pwmPhase += rateHz / (float)SAMPLE_RATE;`);
  L.push(`  if (pwmPhase >= 1.0f) pwmPhase -= 1.0f;`);
  L.push(`  return s * (1.0f - depth * 0.5f * (1.0f - cosf(2.0f * (float)M_PI * pwmPhase)));`);
  L.push(`}`);
  L.push(``);

  // --- I2S ---
  L.push(`// =======================================================`);
  L.push(`// I2S (PCM5102)`);
  L.push(`// =======================================================`);
  L.push(`i2s_chan_handle_t tx_handle;`);
  L.push(``);
  L.push(`void initI2S() {`);
  L.push(`  i2s_chan_config_t cc = I2S_CHANNEL_DEFAULT_CONFIG(I2S_NUM_0, I2S_ROLE_MASTER);`);
  L.push(`  i2s_new_channel(&cc, &tx_handle, NULL);`);
  L.push(`  i2s_std_config_t sc = {`);
  L.push(`    .clk_cfg  = I2S_STD_CLK_DEFAULT_CONFIG(SAMPLE_RATE),`);
  L.push(`    .slot_cfg = I2S_STD_PHILIPS_SLOT_DEFAULT_CONFIG(`);
  L.push(`                  I2S_DATA_BIT_WIDTH_16BIT, I2S_SLOT_MODE_STEREO),`);
  L.push(`    .gpio_cfg = {`);
  L.push(`      .mclk = I2S_GPIO_UNUSED,`);
  L.push(`      .bclk = (gpio_num_t)PIN_I2S_BCK,`);
  L.push(`      .ws   = (gpio_num_t)PIN_I2S_LRCK,`);
  L.push(`      .dout = (gpio_num_t)PIN_I2S_DIN,`);
  L.push(`      .din  = I2S_GPIO_UNUSED`);
  L.push(`    }`);
  L.push(`  };`);
  L.push(`  i2s_channel_init_std_mode(tx_handle, &sc);`);
  L.push(`  i2s_channel_enable(tx_handle);`);
  L.push(`}`);
  L.push(``);

  // --- Helpers ---
  L.push(`// =======================================================`);
  L.push(`// HELPERS`);
  L.push(`// =======================================================`);
  L.push(`int readPot(uint8_t pin) {`);
  L.push(`  int s = 0;`);
  L.push(`  for (int i = 0; i < 8; i++) s += analogRead(pin);`);
  L.push(`  return s >> 3;`);
  L.push(`}`);
  L.push(``);
  L.push(`float phrygianRatio(float norm) {`);
  L.push(`  int idx = (int)(norm * (PHRYGIAN_LEN - 1) + 0.5f);`);
  L.push(`  if (idx < 0) idx = 0;`);
  L.push(`  if (idx >= PHRYGIAN_LEN) idx = PHRYGIAN_LEN - 1;`);
  L.push(`  return powf(2.0f, (float)PHRYGIAN_NOTES[idx] / 12.0f);`);
  L.push(`}`);
  L.push(``);
  L.push(`// Monophonic: stop all other voices before triggering a new one`);
  L.push(`void triggerVoice(int i) {`);
  L.push(`  for (int j = 0; j < NUM_VOICES; j++) voices[j].active = false;`);
  L.push(`  voices[i].data       = SAMPLES[i];`);
  L.push(`  voices[i].length     = SAMPLE_LENS[i];`);
  L.push(`  voices[i].position   = 0.0f;`);
  L.push(`  voices[i].pitchRatio = samplePitch[i];`);
  L.push(`  voices[i].active     = (SAMPLE_LENS[i] > 0);`);
  L.push(`}`);
  L.push(``);

  // --- Setup ---
  L.push(`// =======================================================`);
  L.push(`// SETUP`);
  L.push(`// =======================================================`);
  L.push(`bool     btnPrev[NUM_VOICES]      = {};`);
  L.push(`uint32_t lastTrigger[NUM_VOICES]  = {};`);
  L.push(`#define  DEBOUNCE_MS 50`);
  L.push(``);
  L.push(`void setup() {`);
  L.push(`  Serial.begin(115200);`);
  L.push(`  Serial.println("PercuSynth Sample Firmware");`);
  L.push(`  analogReadResolution(12);`);
  L.push(`  for (int i = 0; i < NUM_VOICES; i++) {`);
  L.push(`    pinMode(BTN_PINS[i], INPUT_PULLUP);`);
  L.push(`    voices[i].active = false;`);
  L.push(`  }`);
  L.push(`  initI2S();`);
  L.push(`  computeLPF(8000.0f, 0.0f);`);
  L.push(`  Serial.println("Ready.");`);
  L.push(`  Serial.println("Buttons: GPIO 44,42,0,45,47");`);
  L.push(`  Serial.println("Pots: GPIO 1=pitch  2=filter  8=reso  10=pwm");`);
  L.push(`}`);
  L.push(``);

  // --- Loop ---
  L.push(`// =======================================================`);
  L.push(`// LOOP`);
  L.push(`// =======================================================`);
  L.push(`void loop() {`);
  L.push(`  // Pots`);
  L.push(`  float potPitch  = readPot(POT_PINS[0]) / 4095.0f;`);
  L.push(`  float potFilter = readPot(POT_PINS[1]) / 4095.0f;`);
  L.push(`  float potReso   = readPot(POT_PINS[2]) / 4095.0f;`);
  L.push(`  float potPWM    = readPot(POT_PINS[3]) / 4095.0f;`);
  L.push(``);
  L.push(`  // Buttons`);
  L.push(`  for (int i = 0; i < NUM_VOICES; i++) {`);
  L.push(`    bool pressed = (digitalRead(BTN_PINS[i]) == LOW);`);
  L.push(`    if (pressed && !btnPrev[i] && millis() - lastTrigger[i] > DEBOUNCE_MS) {`);
  L.push(`      triggerVoice(i);`);
  L.push(`      lastTrigger[i] = millis();`);
  L.push(`      Serial.printf("Voice %d triggered  pitch=%.4f\\n", i, samplePitch[i]);`);
  L.push(`    }`);
  L.push(`    if (pressed) {`);
  L.push(`      // Hold button + pitch pot → assign Phrygian pitch to this sample only`);
  L.push(`      float p = phrygianRatio(potPitch);`);
  L.push(`      samplePitch[i]       = p;   // saved for next trigger`);
  L.push(`      voices[i].pitchRatio = p;   // applied live to current playback`);
  L.push(`    }`);
  L.push(`    btnPrev[i] = pressed;`);
  L.push(`  }`);
  L.push(``);
  L.push(`  // Filter (pot² curve for musical response)`);
  L.push(`  float cutoff = 200.0f + potFilter * potFilter * 19800.0f;`);
  L.push(`  computeLPF(cutoff, potReso);`);
  L.push(``);
  L.push(`  // Audio buffer`);
  L.push(`  static int16_t buf[BUF_SAMPLES * 2];`);
  L.push(`  for (int s = 0; s < BUF_SAMPLES; s++) {`);
  L.push(`    float mix = 0.0f;`);
  L.push(`    for (int i = 0; i < NUM_VOICES; i++) {`);
  L.push(`      if (!voices[i].active) continue;`);
  L.push(`      uint32_t pos  = (uint32_t)voices[i].position;`);
  L.push(`      float    frac = voices[i].position - (float)pos;`);
  L.push(`      float    s0   = (float)voices[i].data[pos];`);
  L.push(`      float    s1   = (pos + 1 < voices[i].length) ? (float)voices[i].data[pos + 1] : 0.0f;`);
  L.push(`      mix += s0 + frac * (s1 - s0);  // linear interpolation`);
  L.push(`      voices[i].position += voices[i].pitchRatio;`);
  L.push(`      if ((uint32_t)voices[i].position >= voices[i].length) voices[i].active = false;`);
  L.push(`    }`);
  L.push(`    mix /= 32768.0f;                                     // normalize`);
  L.push(`    mix  = applyLPF(mix);                                // filter`);
  L.push(`    float treRate  = 0.5f + potPWM * 19.5f;             // 0.5–20 Hz`);
  L.push(`    float treDepth = potPWM * 0.9f;`);
  L.push(`    mix  = applyTremolo(mix, treRate, treDepth);         // tremolo/PWM`);
  L.push(`    int32_t out = (int32_t)(mix * 32767.0f);`);
  L.push(`    if (out >  32767) out =  32767;`);
  L.push(`    if (out < -32768) out = -32768;`);
  L.push(`    buf[s*2]     = (int16_t)out;   // L`);
  L.push(`    buf[s*2 + 1] = (int16_t)out;   // R`);
  L.push(`  }`);
  L.push(``);
  L.push(`  size_t written;`);
  L.push(`  i2s_channel_write(tx_handle, buf, sizeof(buf), &written, portMAX_DELAY);`);
  L.push(`}`);

  return L.join('\n');
}

function downloadFirmware() {
  log('Generating firmware...');
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  try {
    const code = generateFirmware();
    const blob = new Blob([code], {type: 'text/plain'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'percusynth_samples.ino';
    a.click();
    URL.revokeObjectURL(url);
    log(`Done! ${(code.length/1024).toFixed(1)} KB — open percusynth_samples.ino in Arduino IDE`, 'ok');
  } catch(e) {
    log(`Error: ${e.message}`, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ============================================================
// KEYBOARD
// ============================================================
const keysDown = new Set();
document.addEventListener('keydown', e => {
  const idx = PAD_KEYS.indexOf(e.key);
  if (idx >= 0 && !e.repeat && !keysDown.has(e.key)) {
    keysDown.add(e.key);
    playSample(idx);
    flashPad(idx);
  }
});
document.addEventListener('keyup', e => { keysDown.delete(e.key); });

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  createPads();
  document.getElementById('generate-btn').addEventListener('click', downloadFirmware);

  // Redraw waveforms on resize
  window.addEventListener('resize', () => {
    for (let i = 0; i < NUM_PADS; i++) drawWaveform(i);
  });

  log('PercuSynth Sample Loader ready.', 'ok');
  log('Carga samples con el botón o arrastrando. Teclas 1-5 disparan los pads.');
  log('El PITCH se configura en el hardware: mantén un botón y gira el pot.');
});
